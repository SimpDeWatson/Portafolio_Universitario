    .semana-title {

      transition: all 0.4s;
    }
    
    .github-link:hover {
      background: rgba(255, 0, 170, 0.25);
      border-color: var(--accent2);
      color: var(--accent2);
      box-shadow: 0 0 35px rgba(255, 0, 170, 0.5);
    }

    .pdf-section {
      background: var(--bg-card2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 2rem;
      margin: 2rem 0;
    }
    
    .pdf-title {
      color: var(--accent3);
      margin-bottom: 1.2rem;
      font-family: 'Orbitron', sans-serif;
      font-size: 1.3rem;
    }

    .coming-soon {
      background: rgba(30, 25, 50, 0.6);
      border: 2px dashed var(--accent);
      border-radius: 10px;
      padding: 3.5rem 2rem;
      text-align: center;
      color: var(--text-muted);
