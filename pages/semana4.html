<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Semana 4 - Rafael Palomino</title>
  
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/tareas.css">

  <style>
    .semana-header {
      text-align: center;
      margin-bottom: 2.8rem;
    }
    
    .semana-icon {
      font-size: 3.8rem;
      margin-bottom: 1rem;
      display: block;
      text-shadow: 0 0 25px var(--accent);
    }
    
    .semana-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 2.35rem;
      color: var(--accent);
      letter-spacing: 3px;
      text-shadow: 0 0 20px var(--accent);
      margin-bottom: 0.5rem;
    }
    
    .semana-subtitle {
      color: var(--text-muted);
      font-size: 1.15rem;
      font-family: 'VT323', monospace;
      max-width: 600px;
      margin: 0 auto;
    }

    .github-link {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: rgba(0, 245, 255, 0.12);
      color: var(--accent);
      padding: 0.95rem 2.2rem;
      border-radius: 6px;
      border: 2px solid var(--accent);
      text-decoration: none;
      font-family: 'Orbitron', sans-serif;
      font-size: 1.05rem;
      margin: 2rem 0;
      transition: all 0.4s;
    }
    
    .github-link:hover {
      background: rgba(255, 0, 170, 0.25);
      border-color: var(--accent2);
      color: var(--accent2);
      box-shadow: 0 0 35px rgba(255, 0, 170, 0.5);
    }

    .pdf-section {
      background: var(--bg-card2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 2rem;
      margin: 2rem 0;
    }
    
    .pdf-title {
      color: var(--accent3);
      margin-bottom: 1.2rem;
      font-family: 'Orbitron', sans-serif;
      font-size: 1.3rem;
    }

    iframe {
      background: white;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav>
    <a href="../index.html" class="nav-brand">
      <span>AP</span> Rafael Palomino Adrian Alexis
    </a>
    <ul class="nav-links">
      <li><a href="../index.html">Inicio</a></li>
      <li><a href="../index.html#tareas" class="active">Tareas</a></li>
      <li><a href="../perfil.html">Perfil</a></li>
      <li><a href="../info.html">Información</a></li>
    </ul>
  </nav>

  <div class="tareas-wrapper">
    <div class="semana-header">
      <span class="semana-icon">🕵️</span>
      <h1 class="semana-title">Semana 4</h1>
      <p class="semana-subtitle">UNIDAD I: Programación Orientada a Objetos</p>
    </div>

    <!-- Botón GitHub -->
    <a href="https://github.com/SimpDeWatson/Portafolio_Universitario/tree/main/pages/semana4" 
       target="_blank" 
       class="github-link">
      🌐 Ver carpeta en GitHub
    </a>

    <!-- Sección del PDF -->
    <div class="pdf-section">
      <h3 class="pdf-title">📁 Actividad Semana 4</h3>
      <p>Lea el pdf directamente aquí abajo:</p>
      <iframe 
        src="https://docs.google.com/viewer?url=https://raw.githubusercontent.com/SimpDeWatson/Portafolio_Universitario/main/pages/semana4/Semana4_Apache.pdf&embedded=true" 
        width="100%" 
        height="720px" 
        style="border:none; border-radius:8px;">
      </iframe>
    </div>

    <div style="text-align: center; margin-top: 4rem;">
      <a href="../index.html" class="back-link">← Volver al Inicio</a>
    </div>
  </div>
